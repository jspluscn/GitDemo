server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: repository-core-service
  datasource:
    url: jdbc:mysql://localhost:3306/repo_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848 # 如果使用 Nacos，否则可删除
    gateway:
      discovery:
        locator:
          enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

# NAS 存储配置
repo:
  storage:
    nas-base-path: /git-repositories
    # 健康检查间隔 (ms)

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.repo.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
